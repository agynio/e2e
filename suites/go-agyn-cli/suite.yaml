image: ghcr.io/agynio/devcontainer-go:1
workdir: /opt/app/data
select: |
  suite_tags=("svc_agyn_cli")

  if [ -z "${TAGS:-}" ]; then
    exit 0
  fi

  for tag in ${TAGS}; do
    for suite_tag in "${suite_tags[@]}"; do
      if [ "$tag" = "$suite_tag" ]; then
        echo "$tag"
        exit 0
      fi
    done
  done
run: |
  set -euo pipefail
  cd /opt/app/data

  tags=()
  if [ -n "${TAGS:-}" ]; then
    for tag in ${TAGS}; do
      tags+=("${tag}")
    done
  fi

  if [ -z "${AGYN_BINARY:-}" ]; then
    export AGYN_BINARY="./bin/agyn"
  fi

  if [ ! -x "${AGYN_BINARY}" ]; then
    echo "Agyn binary not found at ${AGYN_BINARY}" >&2
    exit 1
  fi

  tag_args="e2e"
  for tag in "${tags[@]}"; do
    tag_args="${tag_args} ${tag}"
  done

  tmp_json=$(mktemp)
  set +e
  go test -count=1 -tags "${tag_args}" -json ./tests/... 2>&1 | tee "${tmp_json}"
  status=${PIPESTATUS[0]}
  set -e

  go run github.com/jstemmer/go-junit-report/v2@v2.1.0 -parser gojson < "${tmp_json}" > junit.xml
  rm -f "${tmp_json}"
  exit "${status}"
