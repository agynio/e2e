image: ghcr.io/agynio/devcontainer-go:1
workdir: /opt/app/data
select: |
  suite_tags=("svc_gateway" "tf_provider_agyn")

  if [ -z "${TAGS:-}" ]; then
    echo "${suite_tags[0]}"
    exit 0
  fi

  for tag in ${TAGS}; do
    for suite_tag in "${suite_tags[@]}"; do
      if [ "$tag" = "$suite_tag" ]; then
        echo "$tag"
        exit 0
      fi
    done
  done
run: |
  set -euo pipefail
  cd /opt/app/data

  suite_tags=("svc_gateway" "tf_provider_agyn")
  tags=()
  if [ -n "${TAGS:-}" ]; then
    for tag in ${TAGS}; do
      tags+=("${tag}")
    done
  else
    tags=("${suite_tags[@]}")
  fi

  if [ -n "${PROVIDER_BINARY:-}" ] && [ -f "${PROVIDER_BINARY}" ]; then
    provider_dir=$(dirname "${PROVIDER_BINARY}")
    cat > "${PWD}/.terraformrc" <<EOF
  provider_installation {
    dev_overrides {
      "registry.terraform.io/agynio/agyn" = "${provider_dir}"
    }
    direct {}
  }
  EOF
    export TF_CLI_CONFIG_FILE="${PWD}/.terraformrc"
    echo "Using provider binary override at ${PROVIDER_BINARY}"
  fi

  terraform_version="${TERRAFORM_VERSION:-1.6.6}"
  terraform_dir="${PWD}/.terraform-bin"
  terraform_path="${terraform_dir}/terraform"
  if [ ! -x "${terraform_path}" ]; then
    mkdir -p "${terraform_dir}"
    terraform_zip="${terraform_dir}/terraform.zip"
    terraform_url="https://releases.hashicorp.com/terraform/${terraform_version}/terraform_${terraform_version}_linux_amd64.zip"
    if command -v curl >/dev/null 2>&1; then
      curl -sSL -o "${terraform_zip}" "${terraform_url}"
    elif command -v wget >/dev/null 2>&1; then
      wget -qO "${terraform_zip}" "${terraform_url}"
    else
      echo "terraform download requires curl or wget" >&2
      exit 1
    fi
    if command -v unzip >/dev/null 2>&1; then
      unzip -o "${terraform_zip}" -d "${terraform_dir}" >/dev/null
    else
      TERRAFORM_ZIP="${terraform_zip}" TERRAFORM_DIR="${terraform_dir}" python3 - <<'PY'
  import os
  import zipfile

  zip_path = os.environ["TERRAFORM_ZIP"]
  target_dir = os.environ["TERRAFORM_DIR"]
  with zipfile.ZipFile(zip_path, "r") as archive:
      archive.extractall(target_dir)
  PY
    fi
    rm -f "${terraform_zip}"
    chmod +x "${terraform_path}"
  fi

  export TF_ACC_TERRAFORM_PATH="${terraform_path}"

  export TF_ACC=1

  tag_args="e2e"
  for tag in "${tags[@]}"; do
    tag_args="${tag_args} ${tag}"
  done

  tmp_json=$(mktemp)
  set +e
  go test -count=1 -tags "${tag_args}" -json ./tests/... 2>&1 | tee "${tmp_json}"
  status=${PIPESTATUS[0]}
  set -e

  go run github.com/jstemmer/go-junit-report/v2@v2.1.0 -parser gojson < "${tmp_json}" > junit.xml
  rm -f "${tmp_json}"
  exit "$status"
