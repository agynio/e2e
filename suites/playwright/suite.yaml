image: mcr.microsoft.com/playwright:v1.59.1-noble
workdir: /opt/app/data
select: |
  if [ -z "${TAGS:-}" ]; then
    echo "playwright"
    exit 0
  fi

  for tag in ${TAGS}; do
    if [ "$tag" = "svc_console" ] || [ "$tag" = "smoke" ]; then
      echo "$tag"
      exit 0
    fi
  done
run: |
  set -euo pipefail
  cd /opt/app/data

  export E2E_BASE_URL="${E2E_BASE_URL:-http://console-app.platform.svc.cluster.local:3000}"
  export METERING_GRPC_URL="${METERING_GRPC_URL:-http://metering.platform.svc.cluster.local:50051}"

  npm ci --no-fund --no-audit
  npx buf generate

  grep_tags=""
  if [ -n "${TAGS:-}" ]; then
    for tag in ${TAGS}; do
      if [ -n "$grep_tags" ]; then
        grep_tags="${grep_tags}|"
      fi
      grep_tags="${grep_tags}@${tag}"
    done
  fi

  set +e
  if [ -n "$grep_tags" ]; then
    CI=true npx playwright test --grep "$grep_tags"
  else
    CI=true npx playwright test
  fi
  status=$?
  set -e

  if [ ! -f junit.xml ]; then
    echo "ERROR: junit.xml not created" >&2
    exit 1
  fi

  exit "$status"
