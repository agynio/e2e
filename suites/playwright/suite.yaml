image: ghcr.io/agynio/e2e/playwright:v1.59.1-noble
workdir: /opt/app/data
select: |
  suite_tags=("svc_console" "svc_gateway" "svc_threads" "svc_metering" "svc_identity" "smoke")

  if [ -z "${TAGS:-}" ]; then
    echo "playwright"
    exit 0
  fi

  for tag in ${TAGS}; do
    for suite_tag in "${suite_tags[@]}"; do
      if [ "$tag" = "$suite_tag" ]; then
        echo "$tag"
        exit 0
      fi
    done
  done
run: |
  set -euo pipefail
  cd /opt/app/data

  export E2E_DOMAIN="${E2E_DOMAIN:-agyn.dev}"
  export E2E_BASE_URL="${E2E_BASE_URL:-https://console.${E2E_DOMAIN}}"

  npm ci --no-fund --no-audit
  mkdir -p .bin
  curl -fsSL --retry 3 --retry-delay 5 \
    -o .bin/buf \
    "https://github.com/bufbuild/buf/releases/download/v1.68.4/buf-$(uname -s)-$(uname -m)"
  chmod +x .bin/buf
  export PATH="$PWD/.bin:$PWD/node_modules/.bin:$PATH"
  buf --version
  buf generate

  grep_tags=""
  if [ -n "${TAGS:-}" ]; then
    for tag in ${TAGS}; do
      if [ -n "$grep_tags" ]; then
        grep_tags="${grep_tags}|"
      fi
      grep_tags="${grep_tags}@${tag}"
    done
  fi

  set +e
  test_args=()
  if [ -n "${E2E_PLAYWRIGHT_TEST_ARGS:-}" ]; then
    read -r -a test_args <<< "${E2E_PLAYWRIGHT_TEST_ARGS}"
  fi

  if [ -n "$grep_tags" ]; then
    CI=true npx playwright test "${test_args[@]}" --grep "$grep_tags"
  else
    CI=true npx playwright test "${test_args[@]}"
  fi
  status=$?
  set -e

  if [ ! -f junit.xml ]; then
    echo "ERROR: junit.xml not created" >&2
    exit 1
  fi

  exit "$status"
