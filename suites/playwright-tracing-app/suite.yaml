image: mcr.microsoft.com/playwright:v1.59.1-noble
workdir: /opt/app/data
select: |
  suite_tags=("svc_tracing_app" "svc_agents_orchestrator" "smoke")

  if [ -z "${TAGS:-}" ]; then
    echo "smoke"
    exit 0
  fi

  for tag in ${TAGS}; do
    for suite_tag in "${suite_tags[@]}"; do
      if [ "$tag" = "$suite_tag" ]; then
        echo "$tag"
        exit 0
      fi
    done
  done
run: |
  set -euo pipefail
  cd /opt/app/data

  npm ci --no-fund --no-audit
  npx buf generate

  cleanup() {
    if [ -n "${proxy_pid:-}" ]; then
      kill "$proxy_pid" 2>/dev/null || true
    fi
    if [ -n "${callback_pid:-}" ]; then
      kill "$callback_pid" 2>/dev/null || true
    fi
  }
  trap cleanup EXIT

  if [ -z "${E2E_BASE_URL:-}" ]; then
    export TRACING_PROXY_PORT="${TRACING_PROXY_PORT:-5100}"
    export TRACING_APP_TARGET="${TRACING_APP_TARGET:-http://tracing-app.platform.svc.cluster.local:3000}"
    export TRACING_GATEWAY_TARGET="${TRACING_GATEWAY_TARGET:-http://gateway-gateway.platform.svc.cluster.local:8080}"
    export E2E_BASE_URL="http://127.0.0.1:${TRACING_PROXY_PORT}"

    node test/e2e/tracing-proxy.mjs > /tmp/e2e-tracing-proxy.log 2>&1 &
    proxy_pid=$!

    ready=""
    for _ in $(seq 1 30); do
      if curl -sf "http://127.0.0.1:${TRACING_PROXY_PORT}/env.js" >/dev/null; then
        ready="yes"
        break
      fi
      sleep 1
    done

    if [ -z "$ready" ]; then
      echo "ERROR: tracing app proxy failed to start" >&2
      if [ -f /tmp/e2e-tracing-proxy.log ]; then
        cat /tmp/e2e-tracing-proxy.log >&2
      fi
      exit 1
    fi
  fi

  if [ -n "${E2E_OIDC_REDIRECT_URI:-}" ]; then
    callback_port=$(node -e "const url = new URL(process.env.E2E_OIDC_REDIRECT_URI); if (url.protocol !== 'https:') { throw new Error('E2E_OIDC_REDIRECT_URI must use https'); } console.log(url.port || '443');")
    node test/e2e/oidc-callback-server.mjs > /tmp/e2e-oidc-callback.log 2>&1 &
    callback_pid=$!

    ready=""
    for _ in $(seq 1 30); do
      if curl -sk "https://127.0.0.1:${callback_port}/healthz" >/dev/null; then
        ready="yes"
        break
      fi
      sleep 1
    done

    if [ -z "$ready" ]; then
      echo "ERROR: OIDC callback server failed to start" >&2
      if [ -f /tmp/e2e-oidc-callback.log ]; then
        cat /tmp/e2e-oidc-callback.log >&2
      fi
      exit 1
    fi
  fi

  grep_tags=""
  if [ -n "${TAGS:-}" ]; then
    for tag in ${TAGS}; do
      if [ -n "$grep_tags" ]; then
        grep_tags="${grep_tags}|"
      fi
      grep_tags="${grep_tags}@${tag}"
    done
  else
    grep_tags="@smoke"
  fi

  set +e
  if [ -n "$grep_tags" ]; then
    CI=true npx playwright test --grep "$grep_tags"
  else
    CI=true npx playwright test
  fi
  status=$?
  set -e

  if [ ! -f junit.xml ]; then
    echo "ERROR: junit.xml not created" >&2
    exit 1
  fi

  exit "$status"
