image: mcr.microsoft.com/playwright:v1.59.1-noble
workdir: /opt/app/data
select: |
  if [ -z "${TAGS:-}" ]; then
    exit 0
  fi

  for tag in ${TAGS}; do
    if [ "$tag" = "svc_tracing_app" ]; then
      echo "$tag"
      exit 0
    fi
  done
run: |
  set -euo pipefail
  cd /opt/app/data

  namespace="${E2E_NAMESPACE:-${DEVSPACE_NAMESPACE:-platform}}"
  export E2E_BASE_URL="${E2E_BASE_URL:-http://tracing-app.${namespace}.svc.cluster.local:3000}"

  corepack enable
  corepack prepare pnpm@10.33.0 --activate
  pnpm install
  pnpm exec buf generate

  grep_tags=""
  if [ -n "${TAGS:-}" ]; then
    for tag in ${TAGS}; do
      if [ -n "$grep_tags" ]; then
        grep_tags="${grep_tags}|"
      fi
      grep_tags="${grep_tags}@${tag}"
    done
  fi

  set +e
  if [ -n "$grep_tags" ]; then
    CI=true pnpm exec playwright test --grep "$grep_tags"
  else
    CI=true pnpm exec playwright test
  fi
  status=$?
  set -e

  if [ ! -f junit.xml ]; then
    echo "ERROR: junit.xml not created" >&2
    exit 1
  fi

  exit "$status"
