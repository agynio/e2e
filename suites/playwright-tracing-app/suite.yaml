image: mcr.microsoft.com/playwright:v1.59.1-noble
workdir: /opt/app/data
select: |
  suite_tags=("svc_tracing_app" "svc_agents_orchestrator" "smoke")

  if [ -z "${TAGS:-}" ]; then
    echo "smoke"
    exit 0
  fi

  for tag in ${TAGS}; do
    for suite_tag in "${suite_tags[@]}"; do
      if [ "$tag" = "$suite_tag" ]; then
        echo "$tag"
        exit 0
      fi
    done
  done
run: |
  set -euo pipefail
  cd /opt/app/data

  npm ci --no-fund --no-audit
  npx buf generate

  grep_tags=""
  if [ -n "${TAGS:-}" ]; then
    for tag in ${TAGS}; do
      if [ -n "$grep_tags" ]; then
        grep_tags="${grep_tags}|"
      fi
      grep_tags="${grep_tags}@${tag}"
    done
  else
    grep_tags="@smoke"
  fi

  set +e
  if [ -n "$grep_tags" ]; then
    CI=true npx playwright test --grep "$grep_tags"
  else
    CI=true npx playwright test
  fi
  status=$?
  set -e

  if [ ! -f junit.xml ]; then
    echo "ERROR: junit.xml not created" >&2
    exit 1
  fi

  exit "$status"
