name: Agyn CLI E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  e2e-agyn-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      AGYN_AGENT_INIT_IMAGE: ghcr.io/agynio/agent-init:v1.0.0
      CODEX_INIT_IMAGE: ghcr.io/agynio/agent-init-codex:0.13.29
      AGN_INIT_IMAGE: ghcr.io/agynio/agent-init-agn:0.5.5
      CLAUDE_INIT_IMAGE: ghcr.io/agynio/agent-init-claude:0.1.29
      AGN_EXPOSE_INIT_IMAGE: ghcr.io/agynio/agent-init-agn:0.5.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download agyn CLI release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/agynio/agyn-cli/releases/latest"
          asset_name="agyn-linux-amd64"
          asset_url=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}" \
            | AGYN_ASSET_NAME="${asset_name}" python3 -c "$(cat <<'PY'
          import json
          import os
          import sys

          asset_name = os.environ.get('AGYN_ASSET_NAME', '')
          if not asset_name:
              raise SystemExit('AGYN_ASSET_NAME is required')
          data = json.load(sys.stdin)
          for asset in data.get('assets', []):
              if asset.get('name') == asset_name:
                  print(asset.get('browser_download_url', ''))
                  break
          PY
          )")
          if [ -z "${asset_url}" ]; then
            echo "Failed to find ${asset_name} release asset." >&2
            exit 1
          fi
          curl -fsSL -o agyn "${asset_url}"
          chmod +x agyn

      - name: Provision cluster
        uses: agynio/bootstrap/.github/actions/provision@main
        with:
          ref: main

      - name: Run go-agyn-cli suite
        uses: ./.github/actions/run-tests
        with:
          tag: svc_agyn_cli
          include_smoke: false
          agyn-binary: agyn
