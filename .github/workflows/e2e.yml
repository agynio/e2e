name: E2E

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      AGYN_AGENT_INIT_IMAGE: ghcr.io/agynio/agent-init:v1.0.0
      CODEX_INIT_IMAGE: ghcr.io/agynio/agent-init-codex:0.13.29
      AGN_INIT_IMAGE: ghcr.io/agynio/agent-init-agn:0.5.5
      CLAUDE_INIT_IMAGE: ghcr.io/agynio/agent-init-claude:0.1.29
      AGN_EXPOSE_INIT_IMAGE: ghcr.io/agynio/agent-init-agn:0.5.5
      TF_VAR_threads_chart_version: 0.4.12
      TF_VAR_threads_image_tag: 0.4.12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision cluster
        uses: agynio/bootstrap/.github/actions/provision@main
        with:
          ref: main

      - name: Run platform usage E2E test
        uses: ./.github/actions/run-tests
        env:
          E2E_SUITES: playwright
          E2E_PLAYWRIGHT_TEST_ARGS: test/e2e/organization-platform-usage.spec.ts
        with:
          tag: svc_metering
          include_smoke: false

      - name: Run egress data-plane E2E test
        uses: ./.github/actions/run-tests
        env:
          E2E_GO_TEST_RUN: TestEgressGatewayDataPlaneSecretInjection
        with:
          tag: svc_egress,svc_egress_gateway
          include_smoke: false
          e2e-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          artifact-name: e2e-artifacts-egress-dataplane
