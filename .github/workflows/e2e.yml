name: E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Suite tag to run (e.g. svc_reminders)"
        required: false
        type: string
      include_smoke:
        description: "Include smoke suites"
        required: false
        default: true
        type: boolean

concurrency:
  group: e2e-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision cluster
        uses: agynio/bootstrap/.github/actions/provision@main
        with:
          ref: main

      - name: Run E2E tests
        uses: ./.github/actions/run-tests
        with:
          ref: ${{ github.sha }}
          tag: ${{ inputs.tag }}
          include-smoke: ${{ inputs.include_smoke }}
