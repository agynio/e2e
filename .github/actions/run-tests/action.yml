name: Run E2E tests
description: Run the DevSpace E2E pipeline with tag selection.
inputs:
  service:
    description: Service name to translate into svc_<service> tag.
    required: false
  tag:
    description: Additional tags (comma-separated or repeated by callers).
    required: false
  include_smoke:
    description: When tags are provided, append the smoke tag.
    required: false
    default: "true"
  agn-binary:
    description: Optional path to an agn CLI binary in the caller workspace.
    required: false
  provider-binary:
    description: Optional path to a Terraform provider binary in the caller workspace.
    required: false
  ref:
    description: agynio/e2e ref to check out.
    required: false
    default: main
runs:
  using: composite
  steps:
    - name: Checkout e2e repository
      uses: actions/checkout@v4
      with:
        repository: agynio/e2e
        ref: ${{ inputs.ref }}
        path: e2e

    - name: Stage provider binary
      if: ${{ inputs.provider-binary != '' }}
      shell: bash
      run: |
        set -euo pipefail
        source_path="$GITHUB_WORKSPACE/${{ inputs.provider-binary }}"
        if [ ! -f "$source_path" ]; then
          echo "Provider binary not found at $source_path" >&2
          exit 1
        fi
        dest_dir="$GITHUB_WORKSPACE/e2e/suites/go-terraform/.provider"
        mkdir -p "$dest_dir"
        cp "$source_path" "$dest_dir/terraform-provider-agyn"
        chmod +x "$dest_dir/terraform-provider-agyn"

    - name: Stage agn binary
      if: ${{ inputs.agn-binary != '' }}
      shell: bash
      run: |
        set -euo pipefail
        source_path="$GITHUB_WORKSPACE/${{ inputs.agn-binary }}"
        if [ ! -f "$source_path" ]; then
          echo "Agn binary not found at $source_path" >&2
          exit 1
        fi
        dest_dir="$GITHUB_WORKSPACE/e2e/suites/go-agn-cli/bin"
        mkdir -p "$dest_dir"
        cp "$source_path" "$dest_dir/agn"
        chmod +x "$dest_dir/agn"

    - name: Install PyYAML
      shell: bash
      run: |
        set -euo pipefail
        if python3 - <<'PY'
        import yaml
        PY
        then
          exit 0
        fi
        if command -v apt-get >/dev/null 2>&1; then
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y python3-yaml
          else
            apt-get update
            apt-get install -y python3-yaml
          fi
        else
          python3 -m pip install --user --break-system-packages pyyaml
        fi

    - name: Setup DevSpace
      uses: ./e2e/.github/actions/setup-devspace

    - name: Export Agyn test env
      shell: bash
      run: |
        set -euo pipefail

        bootstrap_dir="$GITHUB_WORKSPACE/bootstrap"
        k8s_stack="$bootstrap_dir/stacks/k8s"
        platform_stack="$bootstrap_dir/stacks/platform"
        apps_stack="$bootstrap_dir/stacks/apps"

        if [ -d "$k8s_stack" ]; then
          if ! domain=$(terraform -chdir="$k8s_stack" output -raw domain); then
            echo "Failed to read domain output from ${k8s_stack}." >&2
            exit 1
          fi
          if ! ingress_port=$(terraform -chdir="$k8s_stack" output -raw ingress_port); then
            echo "Failed to read ingress_port output from ${k8s_stack}." >&2
            exit 1
          fi
          if [ -z "$domain" ] || [ -z "$ingress_port" ]; then
            echo "Bootstrap outputs missing domain or ingress_port." >&2
            exit 1
          fi
          gateway_url="https://gateway.${domain}:${ingress_port}"
        fi

        export_base_url="true"
        if [ -z "${AGYN_BASE_URL:-}" ]; then
          export_base_url="false"
          if [ -z "${gateway_url:-}" ]; then
            echo "AGYN_BASE_URL not set and bootstrap outputs unavailable." >&2
            exit 1
          fi
          AGYN_BASE_URL="$gateway_url"
        fi

        if [ "$export_base_url" = "true" ]; then
          echo "AGYN_BASE_URL=$AGYN_BASE_URL" >> "$GITHUB_ENV"
        fi

        if ! gateway_status=$(curl -sS -k -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 20 "${AGYN_BASE_URL}"); then
          echo "AGYN_BASE_URL ${AGYN_BASE_URL} is not reachable from the GitHub runner." >&2
          exit 1
        fi
        if [ "$gateway_status" = "000" ]; then
          echo "AGYN_BASE_URL ${AGYN_BASE_URL} is not reachable from the GitHub runner." >&2
          exit 1
        fi

        if [ -z "${AGYN_API_TOKEN:-}" ]; then
          if [ ! -d "$platform_stack" ]; then
            echo "AGYN_API_TOKEN not set and platform stack missing." >&2
            exit 1
          fi
          if ! AGYN_API_TOKEN=$(terraform -chdir="$platform_stack" output -raw cluster_admin_api_token); then
            echo "Failed to read cluster_admin_api_token output from ${platform_stack}." >&2
            exit 1
          fi
          if [ -z "$AGYN_API_TOKEN" ]; then
            echo "AGYN_API_TOKEN output was empty." >&2
            exit 1
          fi
          echo "AGYN_API_TOKEN=$AGYN_API_TOKEN" >> "$GITHUB_ENV"
        fi

        if [ -z "${AGYN_ORGANIZATION_ID:-}" ]; then
          if [ ! -d "$apps_stack" ]; then
            echo "AGYN_ORGANIZATION_ID not set and apps stack missing." >&2
            exit 1
          fi
          if ! AGYN_ORGANIZATION_ID=$(terraform -chdir="$apps_stack" output -raw bootstrap_organization_id); then
            echo "Failed to read bootstrap_organization_id output from ${apps_stack}." >&2
            exit 1
          fi
          if [ -z "$AGYN_ORGANIZATION_ID" ]; then
            echo "AGYN_ORGANIZATION_ID output was empty." >&2
            exit 1
          fi
          echo "AGYN_ORGANIZATION_ID=$AGYN_ORGANIZATION_ID" >> "$GITHUB_ENV"
        fi

        if [ -z "${AGYN_AGENT_IMAGE:-}" ]; then
          AGYN_AGENT_IMAGE="ghcr.io/agynio/agent-runtime:v1.0.0"
          echo "AGYN_AGENT_IMAGE=$AGYN_AGENT_IMAGE" >> "$GITHUB_ENV"
        fi

        init_image_defaults=(
          "AGYN_AGENT_INIT_IMAGE=ghcr.io/agynio/agent-init:latest"
          "AGN_INIT_IMAGE=ghcr.io/agynio/agent-init-agn:latest"
          "AGN_EXPOSE_INIT_IMAGE=ghcr.io/agynio/agent-init-agn:latest"
          "CODEX_INIT_IMAGE=ghcr.io/agynio/agent-init-codex:latest"
          "CLAUDE_INIT_IMAGE=ghcr.io/agynio/agent-init-claude:latest"
        )
        for init_entry in "${init_image_defaults[@]}"; do
          env_name=${init_entry%%=*}
          default_value=${init_entry#*=}
          env_value=${!env_name:-}
          trimmed_value=$(echo "$env_value" | xargs)
          if [ -z "$trimmed_value" ]; then
            echo "${env_name}=${default_value}" >> "$GITHUB_ENV"
          fi
        done

        if [ -z "${AGYN_MODEL_ID:-}" ]; then
          list_models_payload=$(cat <<EOF
        {"organizationId":"${AGYN_ORGANIZATION_ID}","llmProviderId":"","pageSize":200,"pageToken":""}
        EOF
        )
          if ! model_id=$(curl -fsS -k \
            -H 'Content-Type: application/json' \
            -H 'Connect-Protocol-Version: 1' \
            -H "Authorization: Bearer ${AGYN_API_TOKEN}" \
            -d "$list_models_payload" \
            "${AGYN_BASE_URL}/agynio.api.gateway.v1.LLMGateway/ListModels" \
            | python3 -c "$(cat <<'PY'
        import json
        import sys

        try:
            payload = json.load(sys.stdin)
        except json.JSONDecodeError as exc:
            print(f"Invalid JSON in ListModels response: {exc}", file=sys.stderr)
            sys.exit(1)

        models = payload.get("models") or []
        for model in models:
            meta = model.get("meta") or {}
            model_id = meta.get("id") or model.get("id") or ""
            if model_id:
                print(model_id)
                break
        PY
        )"); then
            echo "Failed to parse ListModels response." >&2
            exit 1
          fi

          if [ -z "$model_id" ]; then
            providers_payload=$(cat <<EOF
        {"organizationId":"${AGYN_ORGANIZATION_ID}","pageSize":200,"pageToken":""}
        EOF
        )
            if ! provider_id=$(curl -fsS -k \
              -H 'Content-Type: application/json' \
              -H 'Connect-Protocol-Version: 1' \
              -H "Authorization: Bearer ${AGYN_API_TOKEN}" \
              -d "$providers_payload" \
              "${AGYN_BASE_URL}/agynio.api.gateway.v1.LLMGateway/ListLLMProviders" \
              | python3 -c "$(cat <<'PY'
        import json
        import sys

        try:
            payload = json.load(sys.stdin)
        except json.JSONDecodeError as exc:
            print(f"Invalid JSON in ListLLMProviders response: {exc}", file=sys.stderr)
            sys.exit(1)

        providers = payload.get("providers") or []
        for provider in providers:
            meta = provider.get("meta") or {}
            provider_id = meta.get("id") or provider.get("id") or ""
            if provider_id:
                print(provider_id)
                break
        PY
        )"); then
              echo "Failed to parse ListLLMProviders response." >&2
              exit 1
            fi

            if [ -z "$provider_id" ]; then
              now=$(date +%s)
              create_provider_payload=$(cat <<EOF
        {"endpoint":"https://llm.e2e.agyn.dev/${now}","authMethod":"AUTH_METHOD_BEARER","token":"e2e-token-${now}","organizationId":"${AGYN_ORGANIZATION_ID}"}
        EOF
        )
              if ! provider_id=$(curl -fsS -k \
                -H 'Content-Type: application/json' \
                -H 'Connect-Protocol-Version: 1' \
                -H "Authorization: Bearer ${AGYN_API_TOKEN}" \
                -d "$create_provider_payload" \
                "${AGYN_BASE_URL}/agynio.api.gateway.v1.LLMGateway/CreateLLMProvider" \
                | python3 -c "$(cat <<'PY'
        import json
        import sys

        try:
            payload = json.load(sys.stdin)
        except json.JSONDecodeError as exc:
            print(f"Invalid JSON in CreateLLMProvider response: {exc}", file=sys.stderr)
            sys.exit(1)

        provider = payload.get("provider") or {}
        meta = provider.get("meta") or {}
        provider_id = meta.get("id") or provider.get("id") or ""
        if provider_id:
            print(provider_id)
        PY
        )"); then
                echo "Failed to parse CreateLLMProvider response." >&2
                exit 1
              fi
              if [ -n "$provider_id" ]; then
                echo "Created LLM provider ${provider_id}"
              fi
            fi

            if [ -z "$provider_id" ]; then
              echo "Unable to determine LLM provider ID." >&2
              exit 1
            fi

            now=$(date +%s)
            create_model_payload=$(cat <<EOF
        {"name":"E2E Model ${now}","llmProviderId":"${provider_id}","remoteName":"gpt-4o-mini","organizationId":"${AGYN_ORGANIZATION_ID}"}
        EOF
        )
            if ! model_id=$(curl -fsS -k \
              -H 'Content-Type: application/json' \
              -H 'Connect-Protocol-Version: 1' \
              -H "Authorization: Bearer ${AGYN_API_TOKEN}" \
              -d "$create_model_payload" \
              "${AGYN_BASE_URL}/agynio.api.gateway.v1.LLMGateway/CreateModel" \
              | python3 -c "$(cat <<'PY'
        import json
        import sys

        try:
            payload = json.load(sys.stdin)
        except json.JSONDecodeError as exc:
            print(f"Invalid JSON in CreateModel response: {exc}", file=sys.stderr)
            sys.exit(1)

        model = payload.get("model") or {}
        meta = model.get("meta") or {}
        model_id = meta.get("id") or model.get("id") or ""
        if model_id:
            print(model_id)
        PY
        )"); then
              echo "Failed to parse CreateModel response." >&2
              exit 1
            fi
            if [ -n "$model_id" ]; then
              echo "Created LLM model ${model_id}"
            fi
          fi

          if [ -z "$model_id" ]; then
            echo "Unable to determine LLM model ID." >&2
            exit 1
          fi

          echo "AGYN_MODEL_ID=$model_id" >> "$GITHUB_ENV"
        fi

    - name: Run DevSpace E2E pipeline
      id: run
      shell: bash
      run: |
        set -euo pipefail
        tags=()
        if [ -n "${{ inputs.service }}" ]; then
          tags+=("svc_${{ inputs.service }}")
        fi
        if [ -n "${{ inputs.tag }}" ]; then
          IFS=',' read -r -a extra_tags <<< "${{ inputs.tag }}"
          for tag in "${extra_tags[@]}"; do
            trimmed=$(echo "$tag" | xargs)
            if [ -n "$trimmed" ]; then
              tags+=("$trimmed")
            fi
          done
        fi

        unique_tags=()
        declare -A seen=()
        for tag in "${tags[@]}"; do
          if [ -z "${seen[$tag]+x}" ]; then
            unique_tags+=("$tag")
            seen[$tag]=1
          fi
        done

        include_smoke="${{ inputs.include_smoke }}"
        if [ -z "$include_smoke" ]; then
          include_smoke="true"
        fi
        include_smoke=$(echo "$include_smoke" | tr '[:upper:]' '[:lower:]')

        namespace="${DEVSPACE_NAMESPACE:-platform}"
        cd "$GITHUB_WORKSPACE/e2e"

        export DEVSPACE_NAMESPACE="$namespace"

        if [ -n "${{ inputs.provider-binary }}" ]; then
          export PROVIDER_BINARY="$GITHUB_WORKSPACE/e2e/suites/go-terraform/.provider/terraform-provider-agyn"
        fi

        set +e
        if [ "${#unique_tags[@]}" -eq 0 ]; then
          devspace run test-e2e
          exit_code=$?
        else
          if [ "$include_smoke" = "true" ]; then
            unique_tags+=("smoke")
          fi
          declare -A seen_run=()
          tag_args=()
          for tag in "${unique_tags[@]}"; do
            if [ -z "${seen_run[$tag]+x}" ]; then
              tag_args+=("--tag" "$tag")
              seen_run[$tag]=1
            fi
          done
          devspace run test-e2e "${tag_args[@]}"
          exit_code=$?
        fi
        set -e

        echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Capture diagnostics
      if: ${{ steps.run.outputs.exit_code != '0' }}
      shell: bash
      run: |
        set -euo pipefail
        namespace="${DEVSPACE_NAMESPACE:-platform}"
        diagnostics_dir="$GITHUB_WORKSPACE/e2e/.diagnostics"
        mkdir -p "$diagnostics_dir/logs"
        kubectl get pods -n "$namespace" -o wide > "$diagnostics_dir/pods-all.txt" || true
        kubectl get pods -n "$namespace" -l app.kubernetes.io/managed-by=e2e -o wide > "$diagnostics_dir/pods.txt" || true
        kubectl describe pods -n "$namespace" -l app.kubernetes.io/managed-by=e2e > "$diagnostics_dir/describe-pods.txt" || true
        kubectl get events -n "$namespace" --sort-by=.metadata.creationTimestamp > "$diagnostics_dir/events.txt" || true
        pods=$(kubectl get pods -n "$namespace" -l app.kubernetes.io/managed-by=e2e -o name 2>/dev/null || true)
        for pod in $pods; do
          pod_name=$(echo "$pod" | sed 's|pod/||')
          kubectl logs -n "$namespace" --all-containers --prefix "$pod" > "$diagnostics_dir/logs/${pod_name}.log" 2>&1 || true
        done

    - name: Upload test artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.service != '' && format('e2e-artifacts-{0}', inputs.service) || 'e2e-artifacts' }}
        path: |
          e2e/.artifacts/
          e2e/.diagnostics/
        include-hidden-files: true
        if-no-files-found: warn

    - name: Fail if tests failed
      if: ${{ steps.run.outputs.exit_code != '0' }}
      shell: bash
      run: exit 1
